<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Связь</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<style>
[data-theme="dark"]{--bg:#0d0f14;--sur:#161920;--sur2:#1e2229;--sur3:#252b35;--brd:#2a3040;--txt:#e8ecf4;--txt2:#8b95a8;--txt3:#5a6478;--sh:0 4px 30px rgba(0,0,0,.45);}
[data-theme="light"]{--bg:#f0f2f7;--sur:#ffffff;--sur2:#f5f7fb;--sur3:#eaecf2;--brd:#d8dce8;--txt:#1a1d27;--txt2:#5a6180;--txt3:#9099b0;--sh:0 4px 20px rgba(0,0,0,.08);}
[data-theme="amoled"]{--bg:#000000;--sur:#0a0a0a;--sur2:#111111;--sur3:#181818;--brd:#222222;--txt:#ffffff;--txt2:#888888;--txt3:#444444;--sh:0 4px 30px rgba(0,0,0,.8);}
:root{--ac:#4f8ef7;--ac2:#7c5cfc;--ag:linear-gradient(135deg,#4f8ef7,#7c5cfc);--ok:#3ecf8e;--er:#f75c5c;--warn:#f7a84f;--r:16px;--rs:10px;}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:99px}

#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:20px;transition:opacity .4s}
.spin{width:36px;height:36px;border:3px solid var(--brd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#auth{min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
#auth::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,247,.12)0%,transparent 70%);top:-200px;left:-200px;pointer-events:none}
#auth::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(124,92,252,.1)0%,transparent 70%);bottom:-150px;right:-100px;pointer-events:none}
.acard{background:var(--sur);border:1px solid var(--brd);border-radius:24px;padding:48px;width:440px;max-width:95vw;position:relative;z-index:1;box-shadow:var(--sh);animation:fadeUp .5s ease}
.alogo{font-family:'Unbounded',sans-serif;font-size:32px;font-weight:700;margin-bottom:8px;background:var(--ag);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.asub{color:var(--txt2);font-size:14px;margin-bottom:32px}
.atabs{display:flex;gap:4px;background:var(--sur2);border-radius:var(--rs);padding:4px;margin-bottom:24px}
.atab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:var(--txt2);transition:all .2s;border:none;background:none}
.atab.on{background:var(--ac);color:#fff}
.aform{display:flex;flex-direction:column;gap:14px}
.fi{display:flex;flex-direction:column;gap:6px}
.fi label{font-size:12px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px}
.fi input{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rs);padding:13px 16px;color:var(--txt);font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.fi input:focus{border-color:var(--ac)}.fi input::placeholder{color:var(--txt3)}
.btn{background:var(--ag);border:none;border-radius:var(--rs);padding:14px;color:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:4px}
.btn:hover{opacity:.9}.btn:disabled{opacity:.5;cursor:not-allowed}
.aerr{background:rgba(247,92,92,.1);border:1px solid rgba(247,92,92,.3);border-radius:var(--rs);padding:12px;font-size:13px;color:var(--er);display:none;margin-bottom:4px}
.adiv{display:flex;align-items:center;gap:12px;color:var(--txt3);font-size:12px}
.adiv::before,.adiv::after{content:'';flex:1;height:1px;background:var(--brd)}
.gbtn{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rs);padding:13px;color:var(--txt);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:border-color .2s;width:100%}
.gbtn:hover{border-color:var(--ac)}

#setup{min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--bg)}
.scard{background:var(--sur);border:1px solid var(--brd);border-radius:24px;padding:48px;width:500px;max-width:95vw;animation:fadeUp .5s ease;max-height:92vh;overflow-y:auto}
.scard h2{font-family:'Unbounded',sans-serif;font-size:22px;margin-bottom:8px}
.scard .sub{color:var(--txt2);font-size:14px;margin-bottom:28px}

#app{display:none;height:100vh;overflow:hidden}
.layout{display:grid;grid-template-columns:260px 1fr;grid-template-rows:60px 1fr;height:100vh;overflow:hidden}

.nb{grid-column:1/-1;display:flex;align-items:center;gap:14px;background:var(--sur);border-bottom:1px solid var(--brd);padding:0 20px;z-index:200}
.nlogo{font-family:'Unbounded',sans-serif;font-weight:700;font-size:20px;background:var(--ag);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;cursor:pointer;text-decoration:none}
.nsrch{flex:1;max-width:300px;position:relative}
.nsrch input{width:100%;background:var(--sur2);border:1px solid var(--brd);border-radius:99px;padding:8px 16px 8px 38px;color:var(--txt);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.nsrch input:focus{border-color:var(--ac)}
.nsrch .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none;font-size:14px}
.nact{margin-left:auto;display:flex;align-items:center;gap:8px}
.nbtn{background:var(--sur2);border:1px solid var(--brd);border-radius:99px;padding:7px 14px;color:var(--txt2);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;font-family:inherit;white-space:nowrap}
.nbtn:hover{border-color:var(--ac);color:var(--txt)}.nbtn.on{background:var(--ac);border-color:var(--ac);color:#fff}
.nava{width:34px;height:34px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:border-color .2s;background:var(--sur3);flex-shrink:0}
.nava:hover{border-color:var(--ac)}
.thm-btn{background:var(--sur2);border:1px solid var(--brd);border-radius:99px;padding:7px 10px;cursor:pointer;font-size:15px;transition:all .2s;display:flex;align-items:center}
.thm-btn:hover{border-color:var(--ac)}
.thm-wrap{position:relative}
.thm-panel{position:absolute;top:calc(100% + 6px);right:0;background:var(--sur);border:1px solid var(--brd);border-radius:var(--rs);padding:8px;display:none;flex-direction:column;gap:4px;min-width:150px;box-shadow:var(--sh);z-index:300}
.thm-panel.open{display:flex}
.thm-opt{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:7px;cursor:pointer;font-size:13px;transition:background .15s;border:none;background:none;color:var(--txt);width:100%;text-align:left;font-family:inherit}
.thm-opt:hover{background:var(--sur2)}

.sleft{background:var(--sur);border-right:1px solid var(--brd);padding:16px;display:flex;flex-direction:column;gap:2px;height:calc(100vh - 60px);overflow-y:auto}
.nitem{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:var(--rs);cursor:pointer;color:var(--txt2);font-size:14px;font-weight:500;transition:all .2s;border:none;background:none;width:100%;text-align:left}
.nitem:hover{background:var(--sur2);color:var(--txt)}.nitem.on{background:rgba(79,142,247,.12);color:var(--ac)}
.nitem .ic{font-size:17px;width:22px;text-align:center}
.nsec{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;padding:14px 13px 5px}
.umini{display:flex;align-items:center;gap:9px;padding:7px 13px;border-radius:var(--rs);cursor:pointer;transition:background .2s}
.umini:hover{background:var(--sur2)}
.umini img{width:30px;height:30px;border-radius:50%;object-fit:cover;background:var(--sur3)}
.umini .nm{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

#main-scroll{overflow:hidden;height:calc(100vh - 60px);position:relative}
.page{display:none !important;position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto}
.page.on{display:block !important}
#page-feed.on{display:flex !important;justify-content:center}
#page-messages.on{overflow:hidden !important}

.feed{padding:20px;display:flex;flex-direction:column;gap:14px;max-width:680px;width:100%;padding-bottom:60px}
.composer{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:18px}
.ctop{display:flex;gap:10px;align-items:flex-start}
.ctop textarea{flex:1;background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rs);padding:12px 15px;color:var(--txt);font-size:15px;font-family:inherit;outline:none;resize:none;min-height:76px;transition:border-color .2s}
.ctop textarea:focus{border-color:var(--ac)}.ctop textarea::placeholder{color:var(--txt3)}
.cact{display:flex;align-items:center;gap:7px;margin-top:11px;padding-top:11px;border-top:1px solid var(--brd)}
.sp{flex:1}
.abtn{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rs);padding:8px 13px;color:var(--txt2);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;font-family:inherit}
.abtn:hover{border-color:var(--ac);color:var(--ac)}
.pbtn{background:var(--ag);border:none;border-radius:var(--rs);padding:8px 18px;color:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.pbtn:hover{opacity:.85}.pbtn:disabled{opacity:.5;cursor:not-allowed}
.mprev{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.mprev-item{position:relative}
.mprev-item img,.mprev-item video{width:90px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--brd)}
.rmv{position:absolute;top:-5px;right:-5px;background:var(--er);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.upbar{height:3px;background:var(--sur3);border-radius:99px;margin-top:7px;overflow:hidden;display:none}
.upbar-i{height:100%;background:var(--ag);border-radius:99px;transition:width .3s}

.post{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;animation:fadeUp .3s ease}
.ph{display:flex;align-items:center;gap:11px;padding:14px 18px 10px}
.pava{width:40px;height:40px;border-radius:50%;object-fit:cover;cursor:pointer;flex-shrink:0;background:var(--sur3)}
.pm{flex:1;min-width:0}
.pname{font-size:14px;font-weight:600;cursor:pointer;display:inline}.pname:hover{color:var(--ac)}
.ptime{font-size:12px;color:var(--txt3);margin-top:1px}
.pviews{font-size:11px;color:var(--txt3);display:flex;align-items:center;gap:3px}
.pdrop{position:relative}
.pdropbtn{background:none;border:none;color:var(--txt3);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1}
.pdropbtn:hover{background:var(--sur2);color:var(--txt)}
.pdropmenu{position:absolute;right:0;top:100%;background:var(--sur);border:1px solid var(--brd);border-radius:var(--rs);overflow:hidden;box-shadow:var(--sh);z-index:50;min-width:140px;display:none}
.pdropmenu.open{display:block}
.pdropitem{display:block;width:100%;padding:10px 14px;background:none;border:none;color:var(--txt);font-size:13px;cursor:pointer;text-align:left;font-family:inherit;transition:background .15s}
.pdropitem:hover{background:var(--sur2)}
.ptxt{padding:0 18px 14px;font-size:15px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.ptxt a{color:var(--ac);text-decoration:none}.ptxt a:hover{text-decoration:underline}
.pmedia{display:grid;gap:2px}
.pmedia.single img,.pmedia.single video{width:100%;max-height:480px;object-fit:cover}
.pmedia.two{grid-template-columns:1fr 1fr}.pmedia.two img,.pmedia.two video{width:100%;height:220px;object-fit:cover}
.pmedia.many{grid-template-columns:1fr 1fr 1fr}.pmedia.many img,.pmedia.many video{width:100%;height:155px;object-fit:cover}
.pmedia img,.pmedia video{cursor:pointer;display:block;transition:filter .15s}.pmedia img:hover{filter:brightness(.88)}
.pactions{display:flex;align-items:center;gap:2px;padding:8px 14px;border-top:1px solid var(--brd)}
/* FIXED: use data attributes for like state, not just class */
.acbtn{background:none;border:none;color:var(--txt3);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:7px 10px;border-radius:var(--rs);transition:all .2s;font-family:inherit;white-space:nowrap;user-select:none}
.acbtn:hover{background:var(--sur2)}
.acbtn[data-active="like"]{color:var(--er)}
.acbtn[data-active="dislike"]{color:var(--warn)}
.sp2{flex:1}
.plink-btn{background:none;border:none;font-size:12px;color:var(--txt3);padding:7px 10px;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit;transition:all .2s}
.plink-btn:hover{background:var(--sur2);color:var(--ac)}

.csec{border-top:1px solid var(--brd)}
.cirow{display:flex;gap:9px;align-items:center;padding:12px 18px}
.cinp{flex:1;background:var(--sur2);border:1px solid var(--brd);border-radius:99px;padding:9px 16px;color:var(--txt);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.cinp:focus{border-color:var(--ac)}.cinp::placeholder{color:var(--txt3)}
.csbtn{background:var(--ac);border:none;border-radius:50%;width:34px;height:34px;color:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
.csbtn:hover{opacity:.85}
.clist-wrap{padding:0 18px 12px;display:flex;flex-direction:column}
.citem{display:flex;gap:9px;padding:10px 0;border-bottom:1px solid var(--brd)}
.citem:last-child{border-bottom:none}
.cava{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;cursor:pointer;background:var(--sur3)}
.cbody{flex:1;min-width:0}
.chdr{display:flex;align-items:baseline;gap:7px;margin-bottom:3px;flex-wrap:wrap}
.cauth{font-size:13px;font-weight:600;cursor:pointer}.cauth:hover{color:var(--ac)}
.ctime{font-size:11px;color:var(--txt3)}
.ctxt{font-size:14px;line-height:1.5;word-break:break-word}
.cactions{display:flex;align-items:center;gap:2px;margin-top:4px}
.cacbtn{background:none;border:none;color:var(--txt3);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;padding:3px 7px;border-radius:6px;transition:all .2s;font-family:inherit;user-select:none}
.cacbtn:hover{background:var(--sur2)}
.cacbtn[data-active="like"]{color:var(--er)}
.cacbtn[data-active="dislike"]{color:var(--warn)}
.creply-btn{font-size:11px;color:var(--txt3);cursor:pointer;margin-top:4px;display:inline-flex;align-items:center;gap:3px;transition:color .2s;background:none;border:none;font-family:inherit;padding:3px 7px;border-radius:6px}
.creply-btn:hover{color:var(--ac);background:var(--sur2)}
.reply-quote{background:var(--sur2);border-left:3px solid var(--ac);border-radius:0 6px 6px 0;padding:6px 10px;margin-bottom:5px;font-size:13px;color:var(--txt2)}
.reply-author{font-weight:600;font-size:12px;color:var(--ac);margin-bottom:2px}
.replies{padding-left:20px;border-left:2px solid var(--brd);margin-top:6px;display:flex;flex-direction:column}
.reply-banner{display:none;padding:8px 18px;background:rgba(79,142,247,.07);border-top:1px solid rgba(79,142,247,.2);font-size:12px;color:var(--ac);align-items:center;gap:8px}
.show-more-btn{padding:8px 18px;font-size:13px;color:var(--ac);cursor:pointer;background:none;border:none;font-family:inherit;text-align:left;width:100%;transition:background .15s}
.show-more-btn:hover{background:var(--sur2)}

.single-post-wrap{max-width:680px;margin:0 auto;padding:20px}

.pcover{height:200px;position:relative;overflow:hidden}
.pcover img,.pcover .covbg{width:100%;height:100%;object-fit:cover}
.pinfobar{background:var(--sur);border-bottom:1px solid var(--brd);padding:0 28px;position:relative}
.pavawr{position:absolute;top:-60px;left:28px}
.pavawr img{width:112px;height:112px;border-radius:50%;object-fit:cover;border:4px solid var(--sur);background:var(--sur3)}
.pdets{padding:14px 0 0 152px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:8px}
.pn{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:600}
.ph2{font-size:13px;color:var(--txt3);margin-top:2px}
.pacts{display:flex;gap:7px;padding-bottom:14px;flex-wrap:wrap}
.pstats{display:flex;gap:28px;padding:10px 0 14px 152px;flex-wrap:wrap}
.pstat .num{font-size:17px;font-weight:700;font-family:'Unbounded',sans-serif}
.pstat .lbl{font-size:12px;color:var(--txt3)}
.ptabs{display:flex;padding:0 28px;border-top:1px solid var(--brd);background:var(--sur)}
.ptab{padding:12px 18px;cursor:pointer;font-size:14px;font-weight:500;color:var(--txt2);border-bottom:2px solid transparent;transition:all .2s}
.ptab.on{color:var(--ac);border-bottom-color:var(--ac)}
.pgrid{display:grid;grid-template-columns:260px 1fr;gap:18px;padding:18px 20px}
@media(max-width:700px){.pgrid{grid-template-columns:1fr}}
.psc{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:18px;margin-bottom:14px}
.psc h3{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--txt2)}
.irow{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--brd);font-size:13px}
.irow:last-child{border-bottom:none}.irow .ic2{color:var(--txt3);width:18px;text-align:center}

.mlayout{display:grid;grid-template-columns:280px 1fr;height:100%;overflow:hidden}
.conv-list{border-right:1px solid var(--brd);overflow-y:auto;background:var(--sur)}
.clhdr{padding:14px;border-bottom:1px solid var(--brd)}
.clhdr h2{font-size:17px;font-weight:600;margin-bottom:10px}
.csearch{width:100%;background:var(--sur2);border:1px solid var(--brd);border-radius:99px;padding:8px 15px;color:var(--txt);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
.csearch:focus{border-color:var(--ac)}
.citem2{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;transition:background .2s;border-bottom:1px solid var(--brd)}
.citem2:hover{background:var(--sur2)}.citem2.on{background:rgba(79,142,247,.08)}
.citem2 img{width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--sur3)}
.cmeta{flex:1;min-width:0}.cmeta .cn{font-size:14px;font-weight:600}
.cmeta .cp{font-size:12px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.cwin{display:flex;flex-direction:column;background:var(--bg);height:100%;overflow:hidden}
.cwh{display:flex;align-items:center;gap:11px;padding:12px 18px;background:var(--sur);border-bottom:1px solid var(--brd)}
.cwh img{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--sur3)}
.cwh .cn2{font-weight:600;font-size:14px}
.cmsgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px}
.mbub{display:flex;gap:9px;max-width:72%}
.mbub.own{flex-direction:row-reverse;align-self:flex-end}
.mbub .mav{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;align-self:flex-end;background:var(--sur3)}
.mcon{background:var(--sur);border:1px solid var(--brd);border-radius:14px;border-bottom-left-radius:3px;padding:10px 14px}
.mbub.own .mcon{background:rgba(79,142,247,.18);border-color:rgba(79,142,247,.3);border-bottom-left-radius:14px;border-bottom-right-radius:3px}
.mtxt{font-size:14px;line-height:1.5}.mtime{font-size:11px;color:var(--txt3);margin-top:3px}
.mimg{max-width:200px;border-radius:9px;margin-top:5px;display:block;cursor:pointer}
.cinpbar{padding:14px 18px;background:var(--sur);border-top:1px solid var(--brd);display:flex;gap:9px;align-items:flex-end}
.cinp2{flex:1;background:var(--sur2);border:1px solid var(--brd);border-radius:14px;padding:10px 14px;color:var(--txt);font-family:inherit;font-size:14px;outline:none;resize:none;max-height:120px;transition:border-color .2s}
.cinp2:focus{border-color:var(--ac)}.cinp2::placeholder{color:var(--txt3)}
.csendbtn{background:var(--ag);border:none;border-radius:11px;padding:10px 16px;color:#fff;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}

.pgrid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;padding:20px}
.pcard{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;transition:transform .2s,box-shadow .2s}
.pcard:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.2)}
.pcov{height:76px}
.pcbody{padding:0 14px 14px;position:relative}
.pcava{width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid var(--sur);margin-top:-30px;background:var(--sur3);cursor:pointer;display:block}
.pcname{font-size:14px;font-weight:600;margin-top:7px;cursor:pointer}.pcname:hover{color:var(--ac)}
.pchan{font-size:12px;color:var(--txt3);margin-bottom:9px}
.pcst{display:flex;gap:12px;margin-bottom:9px;font-size:12px;color:var(--txt2)}
.fbtn{background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.3);border-radius:6px;padding:5px 11px;color:var(--ac);font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s;white-space:nowrap}
.fbtn:hover{background:var(--ac);color:#fff}
.cbtn2{background:var(--sur2);border:1px solid var(--brd);border-radius:6px;padding:5px 7px;color:var(--txt3);font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s}
.cbtn2:hover{border-color:var(--ac);color:var(--ac)}

.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.lb.on{display:flex}
.lb img,.lb video{max-width:90vw;max-height:85vh;border-radius:var(--r)}
.lbx{position:fixed;top:18px;right:22px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:22px;cursor:pointer;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* Cropper */
.crop-container{width:100%;height:380px;overflow:hidden;border-radius:var(--rs);background:#000}
.crop-container img{display:block;max-width:100%}

.twrap{position:fixed;bottom:22px;right:22px;z-index:2000;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rs);padding:12px 16px;font-size:14px;box-shadow:var(--sh);animation:toastIn .3s ease;display:flex;align-items:center;gap:9px;min-width:220px;pointer-events:auto}
.toast.ok{border-left:3px solid var(--ok)}.toast.err{border-left:3px solid var(--er)}.toast.info{border-left:3px solid var(--ac)}

.movl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.movl.on{display:flex}
.modal{background:var(--sur);border:1px solid var(--brd);border-radius:20px;width:490px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:fadeUp .3s ease}
.mhdr{padding:18px 22px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--sur);z-index:1}
.mhdr h3{font-size:17px;font-weight:600}
.mcls{background:none;border:none;color:var(--txt3);font-size:19px;cursor:pointer;padding:3px;border-radius:5px;line-height:1}
.mcls:hover{color:var(--txt);background:var(--sur2)}
.mbody{padding:22px}
.mfoot{padding:14px 22px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:9px;position:sticky;bottom:0;background:var(--sur)}
.sbtn{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rs);padding:9px 16px;color:var(--txt);font-family:inherit;font-size:14px;cursor:pointer}
.sbtn:hover{border-color:var(--ac)}
.ef{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.ef label{font-size:12px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px}
.ef input,.ef textarea{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rs);padding:10px 13px;color:var(--txt);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.ef input:focus,.ef textarea:focus{border-color:var(--ac)}.ef textarea{resize:vertical;min-height:76px}
.avrow{display:flex;gap:11px;align-items:center}
.avrow img{width:52px;height:52px;border-radius:50%;object-fit:cover;background:var(--sur3)}
.ulbl{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rs);padding:7px 12px;color:var(--txt2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-block}
.ulbl:hover{border-color:var(--ac);color:var(--ac)}

/* online dot helper */
.ava-wrap{position:relative;flex-shrink:0}
.ava-wrap .odot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--sur)}
.odot-on{background:var(--ok)}.odot-off{background:var(--txt3)}

.empty{text-align:center;padding:56px 20px;color:var(--txt3)}
.empty .ei{font-size:44px;margin-bottom:10px;opacity:.4}
input[type="file"]{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(36px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>

  g('aerr').style.display='none';
}
function aerr(m){const e=g('aerr');e.textContent=m;e.style.display='block';}
async function doLogin(){
  const e=g('le').value.trim(),p=g('lp').value;
  if(!e||!p)return aerr('Заполните все поля');
  bl('lbtn',true,'Входим...');
  try{await signInWithEmailAndPassword(auth,e,p);}
  catch(ex){aerr(fmsg(ex.code));bl('lbtn',false,'Войти');}
}

onAuthStateChanged(auth,async user=>{
  g('loader').style.opacity='0';
  setTimeout(()=>g('loader').style.display='none',400);
  if(!user){scr('auth');return;}
  me=user;
  const s=await getDoc(doc(db,'users',user.uid));

function setOnline(){
  if(!me)return;
  updateDoc(doc(db,'users',me.uid),{online:true,lastSeen:serverTimestamp()}).catch(()=>{});
}

  if(me)updateDoc(doc(db,'users',me.uid),{online:false,lastSeen:serverTimestamp()}).catch(()=>{});
});

// ─── CROP ───
function triggerCrop(e,target){
  const f=e.target.files[0]; if(!f)return;
  cropTarget=target;
  if(cropperInst){cropperInst.destroy();cropperInst=null;}
  const url=URL.createObjectURL(f);
  const imgEl=g('crop-img');
  imgEl.src=url;
  imgEl.onload=()=>{
    cropperInst=new Cropper(imgEl,{
      aspectRatio:1, viewMode:1, dragMode:'move',
      autoCropArea:0.8, guides:true, center:true,
      highlight:false, background:true,
      cropBoxMovable:true, cropBoxResizable:true,
      toggleDragModeOnDblclick:false,
    });
  };
  oMod('crop-modal');
  e.target.value='';
}
function cropAct(action,val){
  if(!cropperInst)return;
  if(action==='rotate')cropperInst.rotate(val);
  else if(action==='zoom')cropperInst.zoom(val);
  else if(action==='reset')cropperInst.reset();
}
function cancelCrop(){
  if(cropperInst){cropperInst.destroy();cropperInst=null;}
  cMod('crop-modal');
}
async function applyCrop(){
  if(!cropperInst)return;
  bl('crop-apply-btn',true,'...');
  cropperInst.getCroppedCanvas({width:400,height:400,imageSmoothingQuality:'high'}).toBlob(blob=>{
    const file=new File([blob],'avatar.jpg',{type:'image/jpeg'});
    const url=URL.createObjectURL(blob);
    if(cropTarget==='setup'){suAvaF=file;g('su-ap').src=url;}
    else if(cropTarget==='edit'){eAvaF=file;g('eap').src=url;}
    cropperInst.destroy();cropperInst=null;
    cMod('crop-modal');
    bl('crop-apply-btn',false,'Применить');
    toast('Фото обрезано! ✅','ok');
  },'image/jpeg',0.92);
}

// ─── SETUP ───
async function doSetup(){
  const name=g('su-n').value.trim();
  const uname=g('su-u').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  if(!name)return toast('Введите имя','err');
  if(!uname)return toast('Введите имя пользователя','err');
  bl('su-btn',true,'Сохраняем...');
  try{
    const uq=query(collection(db,'users'),where('username','==',uname));
    if(!(await getDocs(uq)).empty){toast('Имя занято','err');bl('su-btn',false,'Начать →');return;}
    let ava=me.photoURL||'';
    if(suAvaF)ava=await upload(suAvaF);
    const p={uid:me.uid,name,username:uname,dob:g('su-dob').value||'',bio:g('su-b').value.trim(),city:g('su-c').value.trim(),work:'',avatar:ava,cover:'',followers:[],following:[],online:true,lastSeen:serverTimestamp(),createdAt:serverTimestamp()};
    await setDoc(doc(db,'users',me.uid),p);
    myP=p; launch();
  }catch(ex){toast('Ошибка: '+ex.message,'err');bl('su-btn',false,'Начать →');}
}

// ─── LAUNCH ───
async function launch(){
  scr('app'); navAva();
  await loadUsers(); miniUsers(); renderPeople(); renderChats(); startFeed();
  gpage('feed');
  setInterval(async()=>{await loadUsers();miniUsers();},30000);
}
function navAva(){const s=myP?.avatar||dava(myP?.name||'?');g('nava').src=s;g('cava').src=s;}

// ─── USERS ───
async function loadUsers(){
  const s=await getDocs(collection(db,'users'));
  users=s.docs.map(d=>d.data());
}
function byUid(uid){return users.find(u=>u.uid===uid);}
async function ensureUser(uid){
  if(byUid(uid))return;
  try{const s=await getDoc(doc(db,'users',uid));if(s.exists()){users.push(s.data());}}catch(e){}
}

// ─── PAGES ───
function gpage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  g('page-'+n)?.classList.add('on');
  ['feed','msg','ppl'].forEach(k=>{
    const map={feed:'feed',msg:'messages',ppl:'people'};
    [g('nb-'+k),g('si-'+k)].forEach(b=>b?.classList.toggle('on',map[k]===n));
  });
  g('si-profile')?.classList.toggle('on',n==='profile'||n==='post');
  if(n==='people'){loadUsers().then(()=>{renderPeople();miniUsers();});}
  if(n==='messages')renderChats();
}
function goMyProfile(){goPro(me.uid);}

// ─── SINGLE POST ───
async function openPostPage(postId){
  gpage('post');
  g('single-post-cont').innerHTML='<div style="padding:60px;text-align:center"><div class="spin" style="margin:0 auto"></div></div>';
  try{
    const snap=await getDoc(doc(db,'posts',postId));
    if(!snap.exists()){g('single-post-cont').innerHTML='<div class="empty"><div class="ei">🔍</div><p>Пост не найден</p></div>';return;}
    const p={id:snap.id,...snap.data()};
    await ensureUser(p.authorId);
    updateDoc(doc(db,'posts',postId),{views:increment(1)}).catch(()=>{});
    p.views=(p.views||0)+1;
    g('single-post-cont').innerHTML=postH(p,true);
  }catch(ex){g('single-post-cont').innerHTML='<div class="empty"><div class="ei">⚠️</div><p>Ошибка загрузки</p></div>';}
}

// ─── FEED ───
function startFeed(){
  if(unFeed)unFeed();
  const q=query(collection(db,'posts'),orderBy('createdAt','desc'),limit(60));
  unFeed=onSnapshot(q,async snap=>{
    if(users.length===0)await loadUsers();
    const posts=snap.docs.map(d=>({id:d.id,...d.data()}));
    const missing=[...new Set(posts.map(p=>p.authorId))].filter(uid=>!byUid(uid));
    if(missing.length)await Promise.all(missing.map(uid=>ensureUser(uid)));
    const el=g('posts');
    if(!el)return;
    el.innerHTML=posts.length?posts.map(p=>postH(p)).join(''):
      '<div class="empty"><div class="ei">📰</div><p>Пока нет постов. Будьте первым!</p></div>';
  },err=>{
    g('posts').innerHTML=`<div class="empty"><div class="ei">⚠️</div><p>${err.code==='permission-denied'?'Нет доступа к Firestore':'Ошибка загрузки'}</p></div>`;
  });
}

// ─── POST HTML ───
function postH(p, showAll=false){
  const a=byUid(p.authorId)||{uid:p.authorId,name:'Пользователь',username:'user',avatar:''};
  const liked=(p.likes||[]).includes(me.uid);
  const disliked=(p.dislikes||[]).includes(me.uid);
  const mn=(p.media||[]).length;
  const mc=mn===1?'single':mn===2?'two':mn>=3?'many':'';
  const isOwn=p.authorId===me.uid;
  const allC=p.comments||[];
  const toShow=showAll?allC:allC.slice(-3);
  const hidden=allC.length-toShow.length;
  const postUrl=`${location.origin}${location.pathname}#post-${p.id}`;
  return `<div class="post" id="post-${p.id}">
    <div class="ph">
      <img class="pava" src="${a.avatar||dava(a.name)}" onclick="goPro('${a.uid}')" alt="">
      <div class="pm">
        <span class="pname" onclick="goPro('${a.uid}')">${esc(a.name)}</span>
        <div class="ptime">${ago(p.createdAt)}${p.edited?' <span style="font-size:10px;opacity:.6">(ред.)</span>':''}</div>
        <div class="pviews">👁 ${p.views||0} просмотров</div>
      </div>
      ${isOwn?`<div class="pdrop">
        <button class="pdropbtn" onclick="toggleDropMenu('pdm-${p.id}')">⋯</button>
        <div class="pdropmenu" id="pdm-${p.id}">
          <button class="pdropitem" onclick="openEditPost('${p.id}','${esc(p.text||'')}');toggleDropMenu('pdm-${p.id}')">✏️ Редактировать</button>
          <button class="pdropitem" style="color:var(--er)" onclick="delPost('${p.id}')">🗑 Удалить</button>
        </div>
      </div>`:''}
    </div>
    ${p.text?`<div class="ptxt">${linkify(esc(p.text))}</div>`:''}
    ${mn>0?`<div class="pmedia ${mc}">${(p.media||[]).map(m=>m.type==='video'
      ?`<video src="${m.url}" controls onclick="event.stopPropagation()"></video>`
      :`<img src="${m.url}" onclick="oLb('${m.url}','img')" alt="">`).join('')}</div>`:''}
    <div class="pactions">
      <button class="acbtn" id="lbtn-${p.id}" data-active="${liked?'like':''}" onclick="likePost('${p.id}')">❤️ <span id="lc-${p.id}">${(p.likes||[]).length}</span></button>
      <button class="acbtn" id="dbtn-${p.id}" data-active="${disliked?'dislike':''}" onclick="dislikePost('${p.id}')">👎 <span id="dc-${p.id}">${(p.dislikes||[]).length}</span></button>
      <button class="acbtn" onclick="togComm('${p.id}')">💬 <span id="cc-${p.id}">${allC.length}</span></button>
      <div class="sp2"></div>
      <button class="plink-btn" onclick="copyLink('${postUrl}')">🔗 Ссылка</button>
      <button class="plink-btn" onclick="openPostPage('${p.id}')">↗ Открыть</button>
    </div>
    <div class="csec" id="cs-${p.id}" style="display:none">
      <div class="clist-wrap" id="cl-${p.id}">
        ${hidden>0?`<button class="show-more-btn" onclick="openPostPage('${p.id}')">↑ Показать ещё ${hidden} комментариев</button>`:''}
        ${toShow.map(c=>comH(c,allC.indexOf(c),p.id)).join('')}
      </div>
      <div class="reply-banner" id="rb-${p.id}">
        <span id="rl-${p.id}"></span>
        <button onclick="cancelReply('${p.id}')" style="background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;margin-left:auto;line-height:1">✕</button>
      </div>
      <div class="cirow">
        <img src="${myP.avatar||dava(myP.name)}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0" alt="">
        <input class="cinp" placeholder="Комментарий..." id="ci-${p.id}" onkeydown="if(event.key==='Enter')sendCom('${p.id}')">
        <button class="csbtn" onclick="sendCom('${p.id}')">➤</button>
      </div>
    </div>
  </div>`;
}

// ─── COMMENT HTML ───
function comH(c,idx,postId){
  const a=byUid(c.authorId)||{uid:c.authorId,name:'Пользователь',avatar:''};
  const lk=(c.likes||[]).includes(me.uid);
  const dlk=(c.dislikes||[]).includes(me.uid);
  const replies=c.replies||[];
  // Safely escape for onclick string attribute
  const safeName=a.name.replace(/['"\\]/g,'');
  const safeText=(c.text||'').slice(0,60).replace(/['"\\]/g,'');
  return `<div class="citem" id="ci-item-${postId}-${idx}">
    <img class="cava" src="${a.avatar||dava(a.name)}" onclick="goPro('${a.uid}')" alt="">
    <div class="cbody">
      <div class="chdr">
        <span class="cauth" onclick="goPro('${a.uid}')">${esc(a.name)}</span>
        <span class="ctime">${ago(c.createdAt)}</span>
      </div>
      ${c.replyTo?`<div class="reply-quote"><div class="reply-author">${esc(c.replyTo.authorName||'')}</div>${esc((c.replyTo.text||'').slice(0,80))}${(c.replyTo.text||'').length>80?'…':''}</div>`:''}
      <div class="ctxt">${esc(c.text||'')}</div>
      <div class="cactions">
        <button class="cacbtn" data-active="${lk?'like':''}" id="clbtn-${postId}-${idx}" onclick="likeComment('${postId}',${idx})">❤️ <span id="clc-${postId}-${idx}">${(c.likes||[]).length}</span></button>
        <button class="cacbtn" data-active="${dlk?'dislike':''}" id="cdbtn-${postId}-${idx}" onclick="dislikeComment('${postId}',${idx})">👎 <span id="cdc-${postId}-${idx}">${(c.dislikes||[]).length}</span></button>
        <button class="creply-btn" onclick="startReply('${postId}',${idx},'${safeName}','${safeText}')">↩ Ответить</button>
      </div>
      ${replies.length?`<div class="replies">${replies.map((r,ri)=>replyH(r,ri,idx,postId)).join('')}</div>`:''}
    </div>
  </div>`;
}

function replyH(r,ri,pIdx,postId){
  const a=byUid(r.authorId)||{uid:r.authorId,name:'Пользователь',avatar:''};
  const lk=(r.likes||[]).includes(me.uid);
  const dlk=(r.dislikes||[]).includes(me.uid);
  return `<div class="citem">
    <img class="cava" src="${a.avatar||dava(a.name)}" onclick="goPro('${a.uid}')" alt="">
    <div class="cbody">
      <div class="chdr"><span class="cauth" onclick="goPro('${a.uid}')">${esc(a.name)}</span><span class="ctime">${ago(r.createdAt)}</span></div>
      <div class="ctxt">${esc(r.text||'')}</div>
      <div class="cactions">
        <button class="cacbtn" data-active="${lk?'like':''}" onclick="likeReply('${postId}',${pIdx},${ri})">❤️ ${(r.likes||[]).length}</button>
        <button class="cacbtn" data-active="${dlk?'dislike':''}" onclick="dislikeReply('${postId}',${pIdx},${ri})">👎 ${(r.dislikes||[]).length}</button>
      </div>
    </div>
  </div>`;
}

// ─── COPY LINK ───
async function copyLink(url){
  try{await navigator.clipboard.writeText(url);}
  catch(e){const t=document.createElement('textarea');t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();}
  toast('Ссылка скопирована 🔗','ok');
}

// ─── MEDIA ───
function pMedia(e,type){Array.from(e.target.files).forEach(f=>{pendM.push({f,type,prev:URL.createObjectURL(f),id:Date.now()+Math.random()});});rPrev();e.target.value='';}
function rPrev(){g('mprev').innerHTML=pendM.map(m=>`<div class="mprev-item">${m.type==='video'?`<video src="${m.prev}"></video>`:`<img src="${m.prev}" alt="">`}<button class="rmv" onclick="rmMedia(${m.id})">✕</button></div>`).join('');}
function rmMedia(id){pendM=pendM.filter(m=>m.id!=id);rPrev();}

// ─── PUBLISH ───
async function doPost(){
  const text=g('ptxt').value.trim();
  if(!text&&pendM.length===0)return toast('Напишите что-нибудь','err');
  bl('pbtn',true,'Публикуем...');
  try{
    let media=[];
    if(pendM.length){
      g('upbar').style.display='block';
      for(let i=0;i<pendM.length;i++){
        const m=pendM[i];
        const url=await upload(m.f,pct=>{g('upbar-i').style.width=((i+pct/100)/pendM.length*100)+'%';});
        media.push({type:m.type,url});
      }
      g('upbar').style.display='none';
    }
    await addDoc(collection(db,'posts'),{authorId:me.uid,text,media,likes:[],dislikes:[],comments:[],views:0,createdAt:serverTimestamp()});
    g('ptxt').value=''; pendM=[]; rPrev();
    toast('Опубликовано! 🎉','ok');
  }catch(ex){toast('Ошибка: '+ex.message,'err');g('upbar').style.display='none';}
  bl('pbtn',false,'Опубликовать');
}

// ─── LIKES — работают напрямую через Firestore, без кеша ───
async function likePost(id){
  const lbtn=g('lbtn-'+id); if(lbtn)lbtn.disabled=true;
  try{
    const snap=await getDoc(doc(db,'posts',id));
    if(!snap.exists())return;
    const data=snap.data();
    const likes=data.likes||[];
    const dislikes=data.dislikes||[];
    const liked=likes.includes(me.uid);
    if(liked){
      await updateDoc(doc(db,'posts',id),{likes:arrayRemove(me.uid)});
      _setPostLikeUI(id,likes.filter(x=>x!==me.uid),dislikes,false,dislikes.includes(me.uid));
    }else{
      await updateDoc(doc(db,'posts',id),{likes:arrayUnion(me.uid),dislikes:arrayRemove(me.uid)});
      _setPostLikeUI(id,[...likes,me.uid],dislikes.filter(x=>x!==me.uid),true,false);
    }
  }catch(e){console.error(e);}
  if(lbtn)lbtn.disabled=false;
}
async function dislikePost(id){
  const dbtn=g('dbtn-'+id); if(dbtn)dbtn.disabled=true;
  try{
    const snap=await getDoc(doc(db,'posts',id));
    if(!snap.exists())return;
    const data=snap.data();
    const likes=data.likes||[];
    const dislikes=data.dislikes||[];
    const disliked=dislikes.includes(me.uid);
    if(disliked){
      await updateDoc(doc(db,'posts',id),{dislikes:arrayRemove(me.uid)});
      _setPostLikeUI(id,likes,dislikes.filter(x=>x!==me.uid),likes.includes(me.uid),false);
    }else{
      await updateDoc(doc(db,'posts',id),{dislikes:arrayUnion(me.uid),likes:arrayRemove(me.uid)});
      _setPostLikeUI(id,likes.filter(x=>x!==me.uid),[...dislikes,me.uid],false,true);
    }
  }catch(e){console.error(e);}
  if(dbtn)dbtn.disabled=false;
}

// ─── UPLOAD ───
async function upload(file,onP){
  const fd=new FormData();fd.append('file',file);fd.append('upload_preset',CL_PRESET);
  return new Promise((res,rej)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('POST',`https://api.cloudinary.com/v1_1/${CL_CLOUD}/auto/upload`);
    xhr.upload.onprogress=e=>{if(onP&&e.lengthComputable)onP(e.loaded/e.total*100);};
    xhr.onload=()=>{try{const d=JSON.parse(xhr.responseText);if(xhr.status===200)res(d.secure_url);else rej(new Error(d.error?.message||'Upload failed'));}catch(e){rej(e);}};
    xhr.onerror=()=>rej(new Error('Network error'));
    xhr.send(fd);
  });
}

function scr(n){g('auth').style.display=n==='auth'?'flex':'none';g('setup').style.display=n==='setup'?'flex':'none';g('app').style.display=n==='app'?'block':'none';}

function oMod(id){g(id)?.classList.add('on');}
function cMod(id){g(id)?.classList.remove('on');}

function cLb(){g('lb').classList.remove('on');}
function toast(msg,type='info'){
  const c=g('tw'),t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span>${{ok:'✅',err:'❌',info:'ℹ️'}[type]||'ℹ️'}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3500);
}
function bl(id,on,lbl){const b=g(id);if(!b)return;b.disabled=on;if(on){b._t=b.textContent;b.textContent=lbl||'⏳';}else b.textContent=b._t||b.textContent;}
function ago(ts){
  if(!ts)return '';
  const ms=ts?.toDate?.()?.getTime?.()||ts?.seconds*1000||ts;
  const d=Date.now()-ms;
  if(d<60000)return 'только что';if(d<3600000)return Math.floor(d/60000)+' мин назад';
  if(d<86400000)return Math.floor(d/3600000)+' ч назад';if(d<604800000)return Math.floor(d/86400000)+' дн назад';
  return new Date(ms).toLocaleDateString('ru');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function linkify(s){return s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');}
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}
function dava(name='?'){
  const i=(name||'?').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';
  const hue=hash(name||'x')%360;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" rx="40" fill="hsl(${hue},50%,38%)"/><text x="40" y="54" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="white">${i}</text></svg>`;
  return 'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
}
function fmsg(c){return({'auth/user-not-found':'Пользователь не найден','auth/wrong-password':'Неверный пароль','auth/invalid-credential':'Неверный email или пароль','auth/email-already-in-use':'Email уже используется','auth/weak-password':'Слабый пароль','auth/invalid-email':'Неверный email','auth/popup-closed-by-user':'Окно закрыто','auth/too-many-requests':'Слишком много попыток. Подождите.'}[c])||'Ошибка: '+c;}
